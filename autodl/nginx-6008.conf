# AutoDL 6008 gateway: Web (6020) + Jupyter (8888)
# Usage: nginx -c /root/zfhs-wan-animate/autodl/nginx-6008.conf

worker_processes 1;
pid /root/zfhs-wan-animate/.run/nginx.pid;
error_log /root/zfhs-wan-animate/.run/nginx-error.log;

events {
    worker_connections 1024;
}

http {
    access_log /root/zfhs-wan-animate/.run/nginx-access.log;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 0.0.0.0:6008;
        server_name _;

        # Jupyter Lab (internal :8888, base_url=/jupyter/)
        location /jupyter/ {
            proxy_pass http://127.0.0.1:8888/jupyter/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /jupyter;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        # wan-animate-api + SPA (internal :6020)
        location / {
            proxy_pass http://127.0.0.1:6020;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Prefix /;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
        }
    }
}
